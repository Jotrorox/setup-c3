name: Test action

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.version }} / ${{ matrix.build }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        version:
          - nightly
          - latest
          - v0.7.0
          - v0.7.1
          - v0.7.2
          - v0.7.3
          - v0.7.4
          - v0.7.5
          - v0.7.6
          - v0.7.7
          - v0.7.8
          - v0.7.9
          - v0.7.10
          - v0.7.11
          - v0.8.0
          - v0.8.0_1
          - v0.8.0_2
          - v0.8.0_3
        build:
          - release
          - debug
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux runtime dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y libxml2

      - name: Setup C3
        id: setup-c3
        uses: ./
        with:
          version: ${{ matrix.version }}
          build: ${{ matrix.build }}

      - name: Verify C3
        shell: bash
        run: |
          c3c --version
          test -n "${{ steps.setup-c3.outputs.c3c-path }}"
          test -n "${{ steps.setup-c3.outputs.version }}"
          test -n "${{ steps.setup-c3.outputs.release-tag }}"
