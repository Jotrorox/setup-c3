name: Backwards test action

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  releases:
    name: Discover C3 releases
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.releases.outputs.matrix }}
    steps:
      - name: Fetch C3 release tags
        id: releases
        shell: bash
        run: |
          set -euo pipefail

          page=1
          entries=()

          while true; do
            response="$(curl -fsSL "https://api.github.com/repos/c3lang/c3c/releases?per_page=100&page=${page}")"
            if [[ "$(jq 'length' <<< "$response")" -eq 0 ]]; then
              break
            fi

            page_entries="$(
              jq -c '
                .[]
                | select(.draft == false)
                | .tag_name as $version
                | [
                    (
                      select(
                        any(
                          .assets[].name;
                          test("^(c3-linux-static|c3-linux|c3-ubuntu-22|c3-ubuntu-20)(-[0-9]+(\\.[0-9]+)+)?\\.tar\\.gz$")
                          or test("^c3-linux\\.tar-[0-9]+\\.gz$")
                        )
                      )
                      | { platform: "ubuntu-latest", version: $version }
                    ),
                    (
                      select(
                        any(
                          .assets[].name;
                          test("^c3-macos(-[0-9]+(\\.[0-9]+)+|-4)?\\.zip$")
                        )
                      )
                      | { platform: "macos-latest", version: $version }
                    ),
                    (
                      select(
                        any(
                          .assets[].name;
                          test("^c3-windows(-[0-9]+(\\.[0-9]+)+|-6)?\\.zip$")
                        )
                      )
                      | { platform: "windows-latest", version: $version }
                    )
                  ]
                | .[]
              ' <<< "$response"
            )"

            if [[ -n "$page_entries" ]]; then
              while IFS= read -r entry; do
                entries+=("$entry")
              done <<< "$page_entries"
            fi

            page=$((page + 1))
          done

          if (( ${#entries[@]} == 0 )); then
            echo "No C3 releases found." >&2
            exit 1
          fi

          matrix="$(printf '%s\n' "${entries[@]}" | jq -cs '{ include: . }')"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo "Testing matrix: ${matrix}"

  backwards-test:
    name: ${{ matrix.platform }} / C3 ${{ matrix.version }}
    needs: releases
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.releases.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup C3
        id: setup-c3
        uses: ./
        with:
          version: ${{ matrix.version }}

      - name: Verify C3
        shell: bash
        run: |
          set -euo pipefail

          c3c --version
          test -n "${{ steps.setup-c3.outputs.c3c-path }}"
          test -n "${{ steps.setup-c3.outputs.version }}"
          test -n "${{ steps.setup-c3.outputs.release-tag }}"
          test "${{ steps.setup-c3.outputs.release-tag }}" = "${{ matrix.version }}"
