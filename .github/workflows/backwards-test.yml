name: Backwards test action

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  releases:
    name: Discover C3 releases
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.releases.outputs.versions }}
    steps:
      - name: Fetch C3 release tags
        id: releases
        shell: bash
        run: |
          set -euo pipefail

          page=1
          tags=()

          while true; do
            response="$(curl -fsSL "https://api.github.com/repos/c3lang/c3c/releases?per_page=100&page=${page}")"
            page_tags="$(
              jq -r '
                .[]
                | select(.draft == false)
                | select(
                    any(
                      .assets[].name;
                      test("^(c3-linux-static|c3-linux|c3-ubuntu-22|c3-ubuntu-20)(-[0-9]+(\\.[0-9]+)+)?\\.tar\\.gz$")
                      or test("^c3-linux\\.tar-[0-9]+\\.gz$")
                    )
                  )
                | .tag_name
              ' <<< "$response"
            )"

            if [[ -z "$page_tags" ]]; then
              break
            fi

            while IFS= read -r tag; do
              tags+=("$tag")
            done <<< "$page_tags"

            page=$((page + 1))
          done

          if (( ${#tags[@]} == 0 )); then
            echo "No C3 releases found." >&2
            exit 1
          fi

          versions="$(printf '%s\n' "${tags[@]}" | jq -R . | jq -cs .)"
          echo "versions=${versions}" >> "$GITHUB_OUTPUT"
          echo "Testing versions: ${versions}"

  backwards-test:
    name: C3 ${{ matrix.version }}
    needs: releases
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.releases.outputs.versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup C3
        id: setup-c3
        uses: ./
        with:
          version: ${{ matrix.version }}

      - name: Verify C3
        shell: bash
        run: |
          set -euo pipefail

          c3c --version
          test -n "${{ steps.setup-c3.outputs.c3c-path }}"
          test -n "${{ steps.setup-c3.outputs.version }}"
          test -n "${{ steps.setup-c3.outputs.release-tag }}"
          test "${{ steps.setup-c3.outputs.release-tag }}" = "${{ matrix.version }}"
