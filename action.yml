name: Setup C3
description: Install the C3 compiler and add it to PATH.
author: Jotrorox

branding:
  icon: box
  color: blue

inputs:
  version:
    description: C3 release to install. Use nightly, latest, or a release tag.
    required: false
    default: nightly
  build:
    description: Artifact build to install. Use release or debug.
    required: false
    default: release

outputs:
  c3c-path:
    description: Absolute path to the installed c3c executable.
    value: ${{ steps.setup.outputs.c3c-path }}
  version:
    description: Installed C3 compiler version string.
    value: ${{ steps.setup.outputs.version }}
  release-tag:
    description: C3 release tag that was installed.
    value: ${{ steps.setup.outputs.release-tag }}

runs:
  using: composite
  steps:
    - name: Install C3
      id: setup
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_BUILD: ${{ inputs.build }}
      run: |
        set -euo pipefail

        case "${INPUT_VERSION}" in
          nightly|prerelease)
            release_ref="latest"
            ;;
          latest|stable)
            release_ref="latest"
            ;;
          *)
            release_ref="${INPUT_VERSION}"
            ;;
        esac

        case "${INPUT_BUILD}" in
          release)
            build_name="release"
            artifact_suffix=""
            ;;
          debug|dbg)
            build_name="debug"
            artifact_suffix="-debug"
            ;;
          *)
            echo "Unsupported C3 artifact build: ${INPUT_BUILD}. Use 'release' or 'debug'." >&2
            exit 1
            ;;
        esac

        linux_asset_base="c3-linux-static"
        if [[ "${release_ref}" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
          release_major="${BASH_REMATCH[1]}"
          release_minor="${BASH_REMATCH[2]}"
          release_patch="${BASH_REMATCH[3]}"

          if (( release_major == 0 && (release_minor < 7 || (release_minor == 7 && release_patch < 10)) )); then
            linux_asset_base="c3-linux"
          fi
        fi

        needs_macos_llvm17=false
        if [[ "${RUNNER_OS}" == "macOS" && "${release_ref}" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
          release_major="${BASH_REMATCH[1]}"
          release_minor="${BASH_REMATCH[2]}"

          if (( release_major == 0 && release_minor < 8 )); then
            needs_macos_llvm17=true
          fi
        fi

        case "${RUNNER_OS}" in
          Linux) asset_name="${linux_asset_base}${artifact_suffix}.tar.gz" ;;
          macOS) asset_name="c3-macos${artifact_suffix}.zip" ;;
          Windows) asset_name="c3-windows${artifact_suffix}.zip" ;;
          *) echo "Unsupported runner OS: ${RUNNER_OS}" >&2; exit 1 ;;
        esac

        echo "Installing C3 ${release_ref} (${asset_name})"

        install_root="${RUNNER_TOOL_CACHE:-$RUNNER_TEMP}/c3"
        dest="$install_root/${release_ref}/${build_name}"

        rm -rf "$dest"
        mkdir -p "$dest"

        asset_names=("$asset_name")
        release_version=""
        if [[ "${release_ref}" =~ ^v?([0-9]+(\.[0-9]+)+)$ ]]; then
          release_version="${BASH_REMATCH[1]}"
        fi

        case "${RUNNER_OS}" in
          Linux)
            asset_names+=(
              "c3-linux${artifact_suffix}.tar.gz"
              "c3-ubuntu-22${artifact_suffix}.tar.gz"
              "c3-ubuntu-20${artifact_suffix}.tar.gz"
              "c3-linux${artifact_suffix}.tar-6.gz"
            )
            if [[ -n "$release_version" ]]; then
              asset_names+=(
                "c3-linux${artifact_suffix}-${release_version}.tar.gz"
                "c3-ubuntu-20${artifact_suffix}-${release_version}.tar.gz"
              )
            fi
            ;;
          macOS)
            asset_names+=("c3-macos${artifact_suffix}-4.zip")
            if [[ -n "$release_version" ]]; then
              asset_names+=("c3-macos${artifact_suffix}-${release_version}.zip")
            fi
            ;;
          Windows)
            asset_names+=("c3-windows${artifact_suffix}-6.zip")
            if [[ -n "$release_version" ]]; then
              asset_names+=("c3-windows${artifact_suffix}-${release_version}.zip")
            fi
            ;;
        esac

        archive=""
        archive_url=""
        resolved_release_url=""
        for candidate in "${asset_names[@]}"; do
          candidate_archive="$RUNNER_TEMP/$candidate"
          if [[ "${release_ref}" == "latest" ]]; then
            candidate_url="https://github.com/c3lang/c3c/releases/latest/download/${candidate}"
            resolved_release_url="$(curl -fsSI "$candidate_url" -o /dev/null -w '%{redirect_url}' 2>/dev/null || true)"
          else
            candidate_url="https://github.com/c3lang/c3c/releases/download/${release_ref}/${candidate}"
            resolved_release_url=""
          fi

          if archive_url="$(curl -fL "$candidate_url" -o "$candidate_archive" -w '%{url_effective}' 2>/dev/null)"; then
            asset_name="$candidate"
            archive="$candidate_archive"
            break
          fi
        done

        if [[ -z "$archive" ]]; then
          echo "Could not download a C3 archive for ${RUNNER_OS} ${release_ref}." >&2
          printf 'Tried: %s\n' "${asset_names[@]}" >&2
          exit 1
        fi

        if [[ "$needs_macos_llvm17" == "true" ]]; then
          if ! command -v brew >/dev/null 2>&1; then
            echo "C3 ${release_ref} requires Homebrew llvm@17 on macOS, but brew was not found." >&2
            exit 1
          fi

          brew list llvm@17 >/dev/null 2>&1 || brew install llvm@17
        fi

        release_tag="$release_ref"
        if [[ "$resolved_release_url" =~ /releases/download/([^/]+)/ ]]; then
          release_tag="${BASH_REMATCH[1]}"
        elif [[ "$archive_url" =~ /releases/download/([^/]+)/ ]]; then
          release_tag="${BASH_REMATCH[1]}"
        fi

        case "$asset_name" in
          *.zip) unzip -q "$archive" -d "$dest" ;;
          *.tar.gz|*.tar-*.gz) tar -xzf "$archive" -C "$dest" ;;
        esac

        c3c_path="$(find "$dest" -type f \( -name c3c -o -name c3c.exe \) | head -n 1)"
        if [ -z "$c3c_path" ]; then
          echo "Could not find c3c in ${asset_name}." >&2
          find "$dest" -maxdepth 5 -type f >&2
          exit 1
        fi

        chmod +x "$c3c_path" || true
        echo "$(dirname "$c3c_path")" >> "$GITHUB_PATH"

        version_output="$($c3c_path --version | head -n 1)"

        echo "c3c-path=$c3c_path" >> "$GITHUB_OUTPUT"
        echo "version=$version_output" >> "$GITHUB_OUTPUT"
        echo "release-tag=$release_tag" >> "$GITHUB_OUTPUT"
