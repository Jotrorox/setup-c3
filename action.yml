name: Setup C3
description: Install the C3 compiler and add it to PATH.
author: Jotrorox

branding:
  icon: box
  color: blue

inputs:
  version:
    description: C3 release to install. Use nightly, latest, stable, prerelease, or a release tag.
    required: false
    default: nightly

outputs:
  c3c-path:
    description: Absolute path to the installed c3c executable.
    value: ${{ steps.setup.outputs.c3c-path }}
  version:
    description: Installed C3 compiler version string.
    value: ${{ steps.setup.outputs.version }}
  release-tag:
    description: C3 release tag that was installed.
    value: ${{ steps.setup.outputs.release-tag }}

runs:
  using: composite
  steps:
    - name: Install C3
      id: setup
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        api_headers=(-H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")
        if [ -n "${GH_TOKEN:-}" ]; then
          api_headers+=(-H "Authorization: Bearer ${GH_TOKEN}")
        fi

        case "${INPUT_VERSION}" in
          nightly|prerelease)
            release_tag="latest-prerelease-tag"
            ;;
          latest|stable)
            release_tag="$(curl -fsSL "${api_headers[@]}" \
              "https://api.github.com/repos/c3lang/c3c/releases/latest" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin).get("tag_name", ""))')"
            ;;
          *)
            release_tag="${INPUT_VERSION}"
            ;;
        esac

        if [ -z "${release_tag:-}" ] || [ "$release_tag" = "null" ]; then
          echo "Could not resolve a C3 release for version '${INPUT_VERSION}'." >&2
          exit 1
        fi

        case "${RUNNER_OS}" in
          Linux)
            asset_name="c3-linux-static.tar.gz"
            ;;
          macOS)
            asset_name="c3-macos.zip"
            ;;
          Windows)
            asset_name="c3-windows.zip"
            ;;
          *)
            echo "Unsupported runner OS: ${RUNNER_OS}" >&2
            exit 1
            ;;
        esac

        echo "Installing C3 ${release_tag} (${asset_name})"

        install_root="${RUNNER_TOOL_CACHE:-$RUNNER_TEMP}/c3"
        dest="$install_root/${release_tag}"
        archive="$RUNNER_TEMP/${asset_name}"
        asset_url="https://github.com/c3lang/c3c/releases/download/${release_tag}/${asset_name}"

        rm -rf "$dest"
        mkdir -p "$dest"

        curl -fL "${api_headers[@]}" "$asset_url" -o "$archive"

        case "$asset_name" in
          *.zip)
            unzip -q "$archive" -d "$dest"
            ;;
          *.tar.gz)
            tar -xzf "$archive" -C "$dest"
            ;;
        esac

        c3c_path="$(find "$dest" -type f \( -name c3c -o -name c3c.exe \) | head -n 1)"
        if [ -z "$c3c_path" ]; then
          echo "Could not find c3c in ${asset_name}." >&2
          find "$dest" -maxdepth 5 -type f >&2
          exit 1
        fi

        chmod +x "$c3c_path" || true
        c3c_dir="$(dirname "$c3c_path")"
        echo "$c3c_dir" >> "$GITHUB_PATH"

        version_output="$("$c3c_path" --version)"
        version_output="${version_output%%$'\n'*}"
        echo "$version_output"

        echo "c3c-path=$c3c_path" >> "$GITHUB_OUTPUT"
        echo "version=$version_output" >> "$GITHUB_OUTPUT"
        echo "release-tag=$release_tag" >> "$GITHUB_OUTPUT"
